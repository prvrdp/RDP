name: Phoenix V103.5 (Dual-Tab Hybrid)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # Auto-run every 6 hours

jobs:
  run-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      matrix:
        # 5 Machines x 2 Tabs = 10 Simultaneous High-Speed Streams
        machine-id: [1, 2, 3, 4, 5]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install selenium==4.9.0 selenium-stealth webdriver-manager

      - name: 🔥 Launch Machine #${{ matrix.machine-id }}
        env:
          PYTHONIOENCODING: utf-8
          INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
          MACHINE_INDEX: ${{ matrix.machine-id }}
        run: |
          # STAGGERED START: Spacing out the 5 machines to prevent IP flag
          DELAY=$(( (MACHINE_INDEX - 1) * 15 ))
          echo "⏳ Machine #${MACHINE_INDEX} waiting ${DELAY}s for slot..."
          sleep $DELAY

          while true; do
            echo "🚀 Starting Hybrid JS-Engine..."
            
            # We use -u for unbuffered logs so you see the "✅ Tab Active" messages instantly
            if python -u main.py; then
              echo "♻️ Purge Cycle Complete. Restarting..."
            else
              echo "❌ Engine Crash Detected."
            fi
            
            echo "⚠️ Cooling down for 10s..."
            sleep 10
          done
